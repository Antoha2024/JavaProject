# ==========================================
# EXTERNAL CONFIGURATION
# Supports environment variables: ${VAR_NAME:default}
# ==========================================

# Database Configuration
db.driver=org.postgresql.Driver
db.url=${DB_URL:jdbc:postgresql://localhost:5432/usersdb}
db.username=${DB_USERNAME:postgres}
db.password=${DB_PASSWORD:password}

# Hibernate Configuration
hibernate.hbm2ddl.auto=update
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.show_sql=${HIBERNATE_SHOW_SQL:true}
hibernate.format_sql=true

# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=user-service
service.host=${SERVICE_HOST:localhost}

# Kafka Configuration
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# ========== SERVICE DISCOVERY ==========
discovery.server.url=${DISCOVERY_URL:http://localhost:8765}

# ========== API GATEWAY ==========
gateway.url=${GATEWAY_URL:http://localhost:8080}

# ========== CIRCUIT BREAKER ==========
circuit.breaker.notification.threshold=3
circuit.breaker.notification.timeout=30000
circuit.breaker.notification.halfOpen=2

# Logging
logging.level.com.userservice=${LOG_LEVEL:DEBUG}