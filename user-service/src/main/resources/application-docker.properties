# ==========================================
# DOCKER ENVIRONMENT CONFIGURATION
# Overrides default properties when SPRING_PROFILES_ACTIVE=docker
# ==========================================

# Database Configuration (из переменных окружения Docker)
db.driver=org.postgresql.Driver
db.url=${DB_URL}
db.username=${DB_USERNAME}
db.password=${DB_PASSWORD}

# Hibernate Configuration
hibernate.hbm2ddl.auto=update
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.show_sql=false
hibernate.format_sql=false

# Server Configuration
server.port=8080
spring.application.name=user-service
service.host=user-service

# Kafka Configuration
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP}

# Service Discovery
discovery.server.url=${DISCOVERY_URL}

# API Gateway
gateway.url=http://api-gateway:8080

# Circuit Breaker
circuit.breaker.notification.threshold=3
circuit.breaker.notification.timeout=30000
circuit.breaker.notification.halfOpen=2

# Logging
logging.level.com.userservice=INFO