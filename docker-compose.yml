version: '3.8'

services:
  # ==================== БАЗЫ ДАННЫХ И БРОКЕРЫ ====================
  
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - microservices-net

  # ==================== ИНФРАСТРУКТУРНЫЕ СЕРВИСЫ ====================

  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server
    ports:
      - "8765:8765"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - microservices-net
    environment:
      DISCOVERY_URL: "http://discovery-server:8765"

  # ==================== ВАШИ МИКРОСЕРВИСЫ ====================

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-server:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      - microservices-net
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: "jdbc:postgresql://postgres:5432/usersdb"
      DB_USERNAME: postgres
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP: "kafka:9092"
      DISCOVERY_URL: "http://discovery-server:8765"

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service-app
    depends_on:
      kafka:
        condition: service_started
      discovery-server:
        condition: service_healthy
    ports:
      - "8082:8080"
    networks:
      - microservices-net
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP: "kafka:9092"
      DISCOVERY_URL: "http://discovery-server:8765"

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres-data: