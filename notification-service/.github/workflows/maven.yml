name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
        options: >-
          --health-cmd "nc -z localhost 9092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Wait for Kafka
        run: |
          echo "Waiting for Kafka to be ready..."
          timeout 60 bash -c 'until nc -z localhost 9092; do sleep 2; done'
          echo "Kafka is ready"

      - name: Create Kafka topic
        run: |
          docker run --rm --network host confluentinc/cp-kafka:7.5.0 kafka-topics --create --topic user-events --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1 || true
          echo "Topic 'user-events' created or already exists"

      - name: Compile project
        run: mvn -B clean compile

      - name: Run tests
        if: success()
        run: mvn -B test

      - name: Check Dockerfile exists
        run: |
          if [ -f "Dockerfile" ]; then
            echo "✅ Dockerfile exists"
          else
            echo "❌ Dockerfile missing"
            exit 1
          fi

      - name: Check application-docker.properties exists
        run: |
          if [ -f "src/main/resources/application-docker.properties" ]; then
            echo "✅ application-docker.properties exists"
          else
            echo "❌ application-docker.properties missing"
            exit 1
          fi

      - name: Check application.properties exists
        run: |
          if [ -f "src/main/resources/application.properties" ]; then
            echo "✅ application.properties exists"
          else
            echo "❌ application.properties missing"
            exit 1
          fi