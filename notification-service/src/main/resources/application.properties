# ==========================================
# EXTERNAL CONFIGURATION
# Supports environment variables: ${VAR_NAME:default}
# ==========================================

# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=notification-service
service.host=${SERVICE_HOST:localhost}

# Kafka Configuration
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# ========== SERVICE DISCOVERY ==========
discovery.server.url=${DISCOVERY_URL:http://localhost:8765}

# ========== API GATEWAY ==========
gateway.url=${GATEWAY_URL:http://localhost:8080}

# ========== MAIL CONFIGURATION ==========
mail.host=${MAIL_HOST:smtp.gmail.com}
mail.port=${MAIL_PORT:587}
mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}
mail.from=${MAIL_FROM:noreply@yourapp.com}

# ========== EMAIL TEMPLATES ==========
mail.subject.create=${MAIL_SUBJECT_CREATE:Welcome! Account Created}
mail.subject.delete=${MAIL_SUBJECT_DELETE:Account Deleted}
mail.text.create=${MAIL_TEXT_CREATE:Hello! Your account has been successfully created.}
mail.text.delete=${MAIL_TEXT_DELETE:Hello! Your account has been deleted.}

# Logging
logging.level.com.notificationservice=${LOG_LEVEL:INFO}