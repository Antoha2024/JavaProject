# ==========================================
# DOCKER ENVIRONMENT CONFIGURATION
# ==========================================

# Server Configuration
server.port=8080
spring.application.name=notification-service
service.host=notification-service

# Kafka Configuration
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP}

# Service Discovery
discovery.server.url=${DISCOVERY_URL}

# Mail Configuration (для Docker можно использовать mock)
mail.host=${MAIL_HOST:smtp.gmail.com}
mail.port=${MAIL_PORT:587}
mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}
mail.from=${MAIL_FROM:noreply@yourapp.com}

# Logging
logging.level.com.notificationservice=INFO